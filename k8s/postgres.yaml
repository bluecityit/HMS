apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hms-postgres
spec:
  serviceName: "hms-postgres"
  replicas: 1
  selector:
    matchLabels:
      app: hms-postgres
  template:
    metadata:
      labels:
        app: hms-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: password
        - name: POSTGRES_DB
          value: hms
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: hms-postgres
spec:
  ports:
  - port: 5432
  clusterIP: None
  selector:
    app: hms-postgres
