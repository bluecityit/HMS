apiVersion: apps/v1
kind: Deployment
metadata:
  name: hms-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hms-api
  template:
    metadata:
      labels:
        app: hms-api
    spec:
      containers:
      - name: hms-api
        image: your-docker-registry/hms-api:latest
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: hms-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: hms-secrets
              key: jwt-secret
---
apiVersion: v1
kind: Service
metadata:
  name: hms-api-service
spec:
  type: ClusterIP
  selector:
    app: hms-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
